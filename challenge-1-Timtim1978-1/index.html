<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge-1 Simple Landing Page with Html and CSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="logo-text">Sanctuary.</div>

      <div class="list">
        <nav>
          <ul class="navbar">
            <li>Home</li>
            <li>About</li>
            <li>Facilities</li>
            <li>Rooms</li>
            <li>Location</li>
          </ul>
        </nav>
        <button class="btn-contact">Contact Us</button>
      </div>
    </header>

    <main>
      <!-- Hero Section -->
      <section class="hero">
        <div class="hero-img">
          <img src="./image/hero_img.jpg" class="image" alt="" />
        </div>

        <div class="hero-icon">
          <img src="./image/healty_icon.jpg" class="icon" alt="" />
        </div>

        <div class="hero-content">
          <h1 class="heading">Unplug. Unwind. Reconnect with Nature.</h1>
        </div>
      </section>
    </main>
  </body>
</html>
